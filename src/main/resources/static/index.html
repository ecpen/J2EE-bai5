<!DOCTYPE html>
<html lang="vi">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Quản lý sách</title>
	<style>
		:root {
			--bg: #f4efe6;
			--panel: rgba(255, 251, 245, 0.92);
			--panel-strong: #fffdf8;
			--ink: #1f2937;
			--muted: #6b7280;
			--accent: #0f766e;
			--accent-strong: #115e59;
			--danger: #b91c1c;
			--line: rgba(31, 41, 55, 0.12);
			--shadow: 0 20px 50px rgba(63, 42, 22, 0.12);
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			font-family: "Segoe UI", Tahoma, Arial, sans-serif;
			color: var(--ink);
			background:
				radial-gradient(circle at top left, rgba(15, 118, 110, 0.16), transparent 34%),
				radial-gradient(circle at bottom right, rgba(217, 119, 6, 0.18), transparent 30%),
				linear-gradient(135deg, #efe4d4, var(--bg));
			min-height: 100vh;
		}

		.container {
			max-width: 1200px;
			margin: 0 auto;
			padding: 32px 20px 48px;
		}

		header {
			display: grid;
			gap: 12px;
			margin-bottom: 28px;
		}

		.eyebrow {
			font-size: 12px;
			letter-spacing: 0.24em;
			text-transform: uppercase;
			color: var(--accent-strong);
			font-weight: 700;
		}

		h1 {
			margin: 0;
			font-size: clamp(2.2rem, 4vw, 4rem);
			line-height: 0.95;
			max-width: 8ch;
			font-family: "Times New Roman", Georgia, serif;
		}

		.subtitle {
			margin: 0;
			font-size: 1.05rem;
			color: var(--muted);
			max-width: 55ch;
		}

		.layout {
			display: grid;
			grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
			gap: 24px;
		}

		.panel {
			background: var(--panel);
			backdrop-filter: blur(10px);
			border: 1px solid rgba(255, 255, 255, 0.45);
			border-radius: 24px;
			box-shadow: var(--shadow);
		}

		.form-panel {
			padding: 24px;
		}

		.panel-title {
			margin: 0 0 8px;
			font-size: 1.55rem;
		}

		.panel-note {
			margin: 0 0 20px;
			color: var(--muted);
			font-size: 0.95rem;
		}

		form {
			display: grid;
			gap: 14px;
		}

		.form-grid {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 14px;
		}

		.field {
			display: grid;
			gap: 6px;
		}

		.field.full {
			grid-column: 1 / -1;
		}

		label {
			font-size: 0.88rem;
			font-weight: 700;
		}

		input {
			width: 100%;
			border: 1px solid var(--line);
			border-radius: 14px;
			padding: 12px 14px;
			background: var(--panel-strong);
			font: inherit;
			color: var(--ink);
		}

		input:focus {
			outline: 2px solid rgba(15, 118, 110, 0.18);
			border-color: var(--accent);
		}

		.actions {
			display: flex;
			gap: 10px;
			flex-wrap: wrap;
		}

		button {
			border: 0;
			border-radius: 999px;
			padding: 12px 18px;
			font: inherit;
			font-weight: 700;
			cursor: pointer;
			transition: transform 160ms ease, opacity 160ms ease, background 160ms ease;
		}

		button:hover {
			transform: translateY(-1px);
		}

		button.primary {
			background: var(--accent);
			color: white;
		}

		button.secondary {
			background: rgba(15, 118, 110, 0.12);
			color: var(--accent-strong);
		}

		button.danger {
			background: rgba(185, 28, 28, 0.12);
			color: var(--danger);
		}

		button.ghost {
			background: transparent;
			color: var(--muted);
		}

		.content-panel {
			padding: 24px;
			display: grid;
			gap: 18px;
		}

		.toolbar {
			display: flex;
			justify-content: space-between;
			gap: 12px;
			align-items: center;
			flex-wrap: wrap;
		}

		.search-box {
			flex: 1;
			min-width: 240px;
		}

		.status {
			min-height: 24px;
			font-size: 0.95rem;
			font-weight: 700;
		}

		.status.ok {
			color: var(--accent-strong);
		}

		.status.error {
			color: var(--danger);
		}

		.table-shell {
			overflow: auto;
			border: 1px solid var(--line);
			border-radius: 18px;
			background: rgba(255, 255, 255, 0.46);
		}

		table {
			width: 100%;
			border-collapse: collapse;
			min-width: 760px;
		}

		th,
		td {
			padding: 14px 16px;
			text-align: left;
			border-bottom: 1px solid var(--line);
			vertical-align: top;
		}

		th {
			font-size: 0.82rem;
			text-transform: uppercase;
			letter-spacing: 0.08em;
			color: var(--muted);
			background: rgba(255, 255, 255, 0.42);
		}

		tr:last-child td {
			border-bottom: 0;
		}

		.book-title {
			font-weight: 700;
			font-size: 1rem;
		}

		.book-meta {
			font-size: 0.88rem;
			color: var(--muted);
			margin-top: 3px;
		}

		.row-actions {
			display: flex;
			gap: 8px;
			flex-wrap: wrap;
		}

		.row-actions button {
			padding: 8px 12px;
			font-size: 0.88rem;
		}

		.empty {
			padding: 28px;
			text-align: center;
			color: var(--muted);
		}

		@media (max-width: 960px) {
			.layout {
				grid-template-columns: 1fr;
			}

			h1 {
				max-width: none;
			}
		}

		@media (max-width: 640px) {
			.form-grid {
				grid-template-columns: 1fr;
			}

			.container {
				padding: 20px 14px 32px;
			}

			.panel,
			.form-panel,
			.content-panel {
				border-radius: 18px;
			}
		}
	</style>
</head>
<body>
	<div class="container">
		<header>
			<div class="eyebrow">Quản lý sách</div>
		</header>

		<div class="layout">
			<section class="panel form-panel">
				<h2 class="panel-title" id="form-title">Thêm sách mới</h2>
				<form id="book-form">
					<div class="form-grid">
						<div class="field full">
							<label for="title">Tên sách</label>
							<input id="title" name="title" required maxlength="200" placeholder="Clean Code">
						</div>

						<div class="field">
							<label for="author">Tác giả</label>
							<input id="author" name="author" required maxlength="120" placeholder="Robert C. Martin">
						</div>

						<div class="field">
							<label for="isbn">Mã sách</label>
							<input id="isbn" name="isbn" required maxlength="20" placeholder="9780132350884">
						</div>

						<div class="field">
							<label for="publisher">Nhà xuất bản</label>
							<input id="publisher" name="publisher" maxlength="120" placeholder="Prentice Hall">
						</div>

						<div class="field">
							<label for="category">Thể loại</label>
							<input id="category" name="category" maxlength="80" placeholder="Programming">
						</div>

						<div class="field">
							<label for="price">Giá</label>
							<input id="price" name="price" type="number" min="1" step="0.01" required placeholder="150000">
						</div>

						<div class="field">
							<label for="publishedYear">Năm xuất bản</label>
							<input id="publishedYear" name="publishedYear" type="number" min="1900" max="2100" placeholder="2008">
						</div>

						<div class="field">
							<label for="quantityInStock">Số lượng tồn</label>
							<input id="quantityInStock" name="quantityInStock" type="number" min="0" required placeholder="10">
						</div>
					</div>

					<div class="actions">
						<button class="primary" type="submit" id="submit-button">Lưu sách</button>
						<button class="secondary" type="button" id="reset-button">Làm trống</button>
					</div>
				</form>
			</section>

			<section class="panel content-panel">
				<div class="toolbar">
					<div>
						<h2 class="panel-title" style="margin-bottom: 4px;">Danh sách sách</h2>
					</div>
					<div class="search-box">
						<input id="keyword" placeholder="Tìm tên sách hoặc tác giả">
					</div>
				</div>

				<div class="status" id="status"></div>

				<div class="table-shell">
					<table>
						<thead>
							<tr>
								<th>Sách</th>
								<th>Mã sách</th>
								<th>Giá</th>
								<th>Tồn kho</th>
								<th>Thao tác</th>
							</tr>
						</thead>
						<tbody id="book-rows"></tbody>
					</table>
					<div id="empty-state" class="empty" hidden>Chưa có sách nào. Hãy thêm cuốn sách đầu tiên bằng form bên trái.</div>
				</div>
			</section>
		</div>
	</div>

	<script>
		const apiUrl = "/api/books";
		const form = document.getElementById("book-form");
		const formTitle = document.getElementById("form-title");
		const submitButton = document.getElementById("submit-button");
		const resetButton = document.getElementById("reset-button");
		const statusBox = document.getElementById("status");
		const rows = document.getElementById("book-rows");
		const emptyState = document.getElementById("empty-state");
		const keywordInput = document.getElementById("keyword");

		let editingId = null;
		let books = [];

		function setStatus(message, type) {
			statusBox.textContent = message || "";
			statusBox.className = "status" + (type ? " " + type : "");
		}

		function resetForm() {
			editingId = null;
			form.reset();
			formTitle.textContent = "Thêm sách mới";
			submitButton.textContent = "Lưu sách";
			setStatus("Sẵn sàng", "ok");
		}

		function fillForm(book) {
			editingId = book.id;
			form.title.value = book.title || "";
			form.author.value = book.author || "";
			form.isbn.value = book.isbn || "";
			form.publisher.value = book.publisher || "";
			form.category.value = book.category || "";
			form.price.value = book.price || "";
			form.publishedYear.value = book.publishedYear || "";
			form.quantityInStock.value = book.quantityInStock || 0;
			formTitle.textContent = "Chỉnh sửa sách #" + book.id;
			submitButton.textContent = "Cập nhật sách";
			setStatus("Đang chỉnh sửa sách #" + book.id, "ok");
			window.scrollTo({ top: 0, behavior: "smooth" });
		}

		function renderBooks(items) {
			books = items;
			rows.innerHTML = "";
			emptyState.hidden = items.length !== 0;

			for (const book of items) {
				const tr = document.createElement("tr");
				tr.innerHTML = `
					<td>
						<div class="book-title">${escapeHtml(book.title)}</div>
						<div class="book-meta">${escapeHtml(book.author)}${book.publisher ? " | " + escapeHtml(book.publisher) : ""}${book.publishedYear ? " | " + book.publishedYear : ""}</div>
					</td>
					<td>${escapeHtml(book.isbn)}</td>
					<td>${formatPrice(book.price)}</td>
					<td>${book.quantityInStock ?? 0}</td>
					<td>
						<div class="row-actions">
							<button class="secondary" type="button" data-action="edit" data-id="${book.id}">S&#7917;a</button>
							<button class="danger" type="button" data-action="delete" data-id="${book.id}">X&#243;a</button>
						</div>
					</td>
				`;
				rows.appendChild(tr);
			}
		}

		function escapeHtml(value) {
			return String(value ?? "")
				.replaceAll("&", "&amp;")
				.replaceAll("<", "&lt;")
				.replaceAll(">", "&gt;")
				.replaceAll('"', "&quot;")
				.replaceAll("'", "&#39;");
		}

		function formatPrice(value) {
			const number = Number(value || 0);
			return new Intl.NumberFormat("en-US", {
				style: "currency",
				currency: "USD",
				maximumFractionDigits: 2
			}).format(number);
		}

		async function fetchBooks(keyword = "") {
			const query = keyword ? `?keyword=${encodeURIComponent(keyword)}` : "";
			const response = await fetch(apiUrl + query);
			if (!response.ok) {
				throw new Error("Không tải được danh sách sách");
			}
			const data = await response.json();
			renderBooks(data);
			if (!keyword) {
				setStatus("Đã tải " + data.length + " sách", "ok");
			}
		}

		function getPayload() {
			return {
				title: form.title.value.trim(),
				author: form.author.value.trim(),
				isbn: form.isbn.value.trim(),
				publisher: form.publisher.value.trim() || null,
				price: Number(form.price.value),
				publishedYear: form.publishedYear.value ? Number(form.publishedYear.value) : null,
				category: form.category.value.trim() || null,
				quantityInStock: Number(form.quantityInStock.value)
			};
		}

		function extractErrorMessage(payload) {
			if (!payload) {
				return "Lỗi không xác định";
			}

			if (payload.validationErrors) {
				const entries = Object.entries(payload.validationErrors);
				if (entries.length) {
					return entries.map(([field, message]) => field + ": " + message).join(" | ");
				}
			}

			return payload.message || "Yêu cầu thất bại";
		}

		async function saveBook(event) {
			event.preventDefault();
			const isEditing = editingId !== null;
			setStatus(isEditing ? "Đang cập nhật sách..." : "Đang lưu sách...", "ok");
			const payload = getPayload();

			const response = await fetch(editingId ? `${apiUrl}/${editingId}` : apiUrl, {
				method: editingId ? "PUT" : "POST",
				headers: {
					"Content-Type": "application/json"
				},
				body: JSON.stringify(payload)
			});

			if (!response.ok) {
				const errorPayload = await response.json().catch(() => null);
				throw new Error(extractErrorMessage(errorPayload));
			}

			resetForm();
			await fetchBooks(keywordInput.value.trim());
			setStatus(isEditing ? "Đã cập nhật sách" : "Đã lưu sách", "ok");
		}

		async function deleteBook(id) {
			const confirmed = window.confirm("Bạn có chắc muốn xóa sách này?");
			if (!confirmed) {
				return;
			}

			setStatus("Đang xóa sách...", "ok");
			const response = await fetch(`${apiUrl}/${id}`, { method: "DELETE" });
			if (!response.ok) {
				const errorPayload = await response.json().catch(() => null);
				throw new Error(extractErrorMessage(errorPayload));
			}

			if (editingId === id) {
				resetForm();
			}

			await fetchBooks(keywordInput.value.trim());
			setStatus("Đã xóa sách", "ok");
		}

		form.addEventListener("submit", async (event) => {
			try {
				await saveBook(event);
			} catch (error) {
				setStatus(error.message, "error");
			}
		});

		resetButton.addEventListener("click", () => {
			resetForm();
		});

		keywordInput.addEventListener("input", async () => {
			try {
				await fetchBooks(keywordInput.value.trim());
			} catch (error) {
				setStatus(error.message, "error");
			}
		});

		rows.addEventListener("click", async (event) => {
			const button = event.target.closest("button[data-action]");
			if (!button) {
				return;
			}

			const id = Number(button.dataset.id);
			const book = books.find((item) => item.id === id);
			if (!book) {
				return;
			}

			try {
				if (button.dataset.action === "edit") {
					fillForm(book);
				}

				if (button.dataset.action === "delete") {
					await deleteBook(id);
				}
			} catch (error) {
				setStatus(error.message, "error");
			}
		});

		fetchBooks().catch((error) => {
			setStatus(error.message, "error");
		});
		resetForm();
	</script>
</body>
</html>
